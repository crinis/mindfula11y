services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  MindfulMarkup\MindfulA11y\:
    resource: "../Classes/*"
    exclude: "../Classes/Domain/Model/*"

  # The runtime cache handle is not autowirable by type (FrontendInterface is
  # ambiguous); bind the shared 'runtime' cache explicitly. The remaining
  # constructor arguments (PageRepository, Context) autowire.
  MindfulMarkup\MindfulA11y\Service\HeadingRecordResolver:
    arguments:
      $runtimeCache: '@cache.runtime'

  MindfulMarkup\MindfulA11y\Form\ValidationErrorDetector:
    public: true
    tags:
      - name: event.listener
        identifier: 'mindfula11y-form-validation-error'
        event: 'TYPO3\CMS\Form\Event\BeforeRenderableIsRenderedEvent'
        method: '__invoke'

  # AJAX route targets are resolved from the container by the backend
  # RouteDispatcher and therefore need to be public.
  MindfulMarkup\MindfulA11y\Controller\AltTextAjaxController:
    public: true

  MindfulMarkup\MindfulA11y\Controller\ScanAjaxController:
    public: true

  MindfulMarkup\MindfulA11y\Controller\StructureAnalysisEnrichmentAjaxController:
    public: true

  MindfulMarkup\MindfulA11y\Controller\StructureAnalysisTicketAjaxController:
    public: true

  # Resolved via makeInstance() from the frontend middleware, which must not
  # construct this service (and its backend module/icon registry graph) for
  # requests that carry no structure-analysis ticket.
  MindfulMarkup\MindfulA11y\Service\StructureAnalysisAuthorizationService:
    public: true

  # Event listeners
  MindfulMarkup\MindfulA11y\EventListener\WebLayoutInfo:
    tags:
      - name: event.listener
        identifier: 'mindfula11y-web-layout-info'
        event: TYPO3\CMS\Backend\Controller\Event\ModifyPageLayoutContentEvent
        method: __invoke
