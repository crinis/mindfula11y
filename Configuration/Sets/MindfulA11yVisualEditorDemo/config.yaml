name: mindfulmarkup/mindfula11y-visualeditor-demo
label: "Mindful A11Y Visual Editor Demo (TYPO3 14)"
# Demonstrates that the mindfula11y heading/landmark ViewHelpers coexist with
# the friendsoftypo3/visual-editor inline editing on TYPO3 v14. The page is
# rendered the v14-idiomatic way (PAGEVIEW + f:render.contentArea) so that
# visual_editor's hooks (f:render.text, content-area drag-and-drop) engage.
#
# This set is TYPO3 v14 only and intended for the development install; it is not
# loaded by the regular MindfulA11yDev set.
dependencies:
  - typo3/fluid-styled-content
