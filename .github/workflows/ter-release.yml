name: Publish to TER

on:
  release:
    types: [published]

jobs:
  # Repeats the CI verification on the tagged commit: releases can be created
  # from commits whose CI run failed, is still pending, or never ran, and a
  # published TER artefact with stale committed JavaScript is unrecoverable
  # (the sources and build tooling are excluded from packaging).
  verify:
    name: Verify committed build output
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (Biome, Stylelint, tsc)
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify committed build output is current
        run: |
          git add --intent-to-add Resources/Public/JavaScript
          git diff --exit-code -- Resources/Public/JavaScript

  publish:
    name: Publish new version to TER
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate release tag
        run: |
          if ! [[ $GITHUB_REF =~ ^refs/tags/v[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            exit 1
          fi

      - name: Extract version from release tag
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: echo "version=${TAG_NAME#v}" >> "$GITHUB_ENV"

      - name: Prepare release description
        env:
          VERSION: ${{ env.version }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          delimiter="$(openssl rand -hex 8)"
          if [[ -z "${RELEASE_BODY// }" ]]; then
            echo "description=Released version ${VERSION} of mindfula11y" >> "$GITHUB_ENV"
          else
            {
              echo "description<<${delimiter}"
              echo "$RELEASE_BODY"
              echo "${delimiter}"
            } >> "$GITHUB_ENV"
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl, mbstring, json, zip, curl
          tools: composer:v2

      - name: Install tailor
        run: composer global require typo3/tailor --prefer-dist --no-progress

      - name: Set extension version
        env:
          VERSION: ${{ env.version }}
        run: tailor set-version "$VERSION"

      - name: Publish to TER
        env:
          TYPO3_API_TOKEN: ${{ secrets.TYPO3_API_TOKEN }}
          # Replaces tailor's default packaging excludes so frontend sources,
          # build tooling and dev configs never ship in the TER artefact.
          TYPO3_EXCLUDE_FROM_PACKAGING: ${{ github.workspace }}/.github/ExcludeFromPackaging.php
          VERSION: ${{ env.version }}
          TER_DESCRIPTION: ${{ env.description }}
        run: tailor ter:publish --comment "$TER_DESCRIPTION" "$VERSION"
