name: CI

on:
  push:
    branches: [main]
    # Tags too: Packagist serves git archives as soon as a tag exists, so a bad
    # tag must at least turn red immediately (TER is additionally gated by the
    # verify job in ter-release.yml).
    tags: ['v*']
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (Biome, Stylelint, tsc)
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify committed build output is current
        # --intent-to-add stages new untracked output so the diff also fails on
        # files that were built but never committed.
        run: |
          git add --intent-to-add Resources/Public/JavaScript
          git diff --exit-code -- Resources/Public/JavaScript

  php:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            typo3: '^13.4'
          - php: '8.4'
            typo3: '^14.3'
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies (TYPO3 ${{ matrix.typo3 }})
        # Narrow the cms-core constraint so the matrix entry deterministically
        # resolves its TYPO3 major; the sibling cms-* packages co-resolve.
        run: |
          composer require --no-update "typo3/cms-core:${{ matrix.typo3 }}"
          composer update --no-interaction --no-progress

      - name: Unit tests
        run: vendor/bin/phpunit
