<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
  xmlns:mindfula11y="http://typo3.org/ns/MindfulMarkup/MindfulA11y/ViewHelpers" data-namespace-typo3-fluid="true">

<!-- Rendered unconditionally: with an empty header (or header_layout "hidden") the
     ViewHelper outputs nothing but still registers the element's logical heading level
     and configured child heading type, so descendant headings keep deriving from it. -->
<mindfula11y:heading
  recordUid="{f:if(condition: data._LOCALIZED_UID, then: data._LOCALIZED_UID, else: data.uid)}"
  type="{data.tx_mindfula11y_headingtype}"
  childType="{data.tx_mindfula11y_childheadingtype}"
  id="c{data.uid}-heading"
  relationId="{data.uid}"
  renderTag="{f:if(condition: '{data.header_layout} == 100', then: '0', else: '1')}"
>{data.header}</mindfula11y:heading>

<f:comment>
  <!-- Render a descendant heading linked to the main heading using ancestorId. It uses
       the ancestor's configured child heading type verbatim (the only way a descendant
       can be an h1), or the ancestor's own level plus one. With a relationId of its own,
       nested descendants can derive from it in turn. -->
  <mindfula11y:heading.descendant
    ancestorId="{data.uid}"
    relationId="child-{data.uid}"
  >
    Descendant of {data.header}
  </mindfula11y:heading.descendant>

  <mindfula11y:heading.descendant
    ancestorId="child-{data.uid}"
  >
    One level deeper
  </mindfula11y:heading.descendant>

  <!-- Render a sibling heading linked to the main heading using siblingId -->
  <mindfula11y:heading.sibling
    siblingId="{data.uid}"
  >
    Sibling of {data.header}
  </mindfula11y:heading.sibling>
</f:comment>

</html>
